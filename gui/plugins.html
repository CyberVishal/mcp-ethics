<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MCP Plugin Manager</title>
<style>
  body {
    background: #0f0f0f;
    color: #e5e5e5;
    font-family: monospace;
    padding: 20px;
  }
  h1 {
    color: #00ffc6;
  }
  .plugin {
    border: 1px solid #333;
    padding: 10px;
    margin-bottom: 10px;
    background: #111;
  }
  button {
    background: #111;
    color: #fff;
    border: 1px solid #333;
    padding: 6px 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>🧩 MCP Plugin Manager</h1>

<div id="plugins">Loading plugins...</div>

<br>
<button onclick="goBack()">⬅ Back to MCP</button>

<script>
async function loadPlugins() {
  const res = await fetch("/plugins");
  const plugins = await res.json();

  const container = document.getElementById("plugins");
  container.innerHTML = "";

  plugins.forEach(p => {
    const div = document.createElement("div");
    div.className = "plugin";
    div.innerHTML = `
      <strong>${p.name}</strong><br>
      ID: ${p.id}<br>
      Enabled: ${p.enabled}
    `;
    container.appendChild(div);
  });
}

function goBack() {
  window.location.href = "/";
}

loadPlugins();
</script>

</body>
</html>

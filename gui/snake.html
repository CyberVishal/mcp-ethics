<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="snake.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 Snake Game</h1>
            <div class="stats">
                <div class="stat">
                    <span class="label">Score:</span>
                    <span id="score">0</span>
                </div>
                <div class="stat">
                    <span class="label">Level:</span>
                    <span id="level">1</span>
                </div>
                <div class="stat">
                    <span class="label">Speed:</span>
                    <span id="speed">100ms</span>
                </div>
            </div>
        </div>

        <div class="game-section">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="controls">
                <div class="button-group">
                    <button id="startBtn" class="btn btn-primary">▶ Start Game</button>
                    <button id="pauseBtn" class="btn btn-secondary" disabled>⏸ Pause</button>
                    <button id="resetBtn" class="btn btn-danger">🔄 Reset</button>
                </div>
                <div class="info">
                    <p><strong>Controls:</strong> Arrow Keys or WASD</p>
                    <p><strong>Objective:</strong> Eat the food and grow without hitting walls or yourself</p>
                </div>
            </div>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
